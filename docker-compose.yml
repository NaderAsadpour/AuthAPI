version: "3.8"

services: 
    sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        container_name: authapi-sqlserver
        environment: 
            SA_PASSWORD: "AuthApi@123456"
            ACCEPT_EULA: "Y"
        ports:
            - "1433:1433"
        volumes:
            - sqlserver-data:/var/opt/mssql
    
volumes:
    sqlserver-data: 